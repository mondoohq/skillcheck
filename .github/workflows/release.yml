name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        uses: evg4b/goreleaser-npm-publisher-action@e4ddd52e3d21a1eda6436815eca2a884ce32762e # v1.5.0
        with:
          prefix: "@mondoohq"
          token: ${{ secrets.NPM_TOKEN }}
          description: >
            AI agent skill security scanner. Detects locally installed
            agent skills, computes SHA-256 checksums, and queries the
            Mondoo AI Agent Security database for known threats.
          keywords: ai-security,agent-skills,skillcheck,mondoo,cli,devsecops,prompt-injection,supply-chain
          files: README.md,LICENSE
