name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        uses: evg4b/goreleaser-npm-publisher-action@3c4b6c50fae2e7167589b632565c478f993b48f7 # v1.3.0
        with:
          prefix: "@mondoohq"
          token: ${{ secrets.NPM_TOKEN }}
          description: >
            AI agent skill security scanner. Detects locally installed
            agent skills, computes SHA-256 checksums, and queries the
            Mondoo AI Agent Security database for known threats.
          keywords: ai-security,agent-skills,skillcheck,mondoo,cli,devsecops,prompt-injection,supply-chain
          license: Apache-2.0
          homepage: https://mondoo.com/ai-agent-security
          author: Mondoo Inc. <hello@mondoo.com>
