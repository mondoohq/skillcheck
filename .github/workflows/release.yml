name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        uses: evg4b/goreleaser-npm-publisher-action@3c4b6c50fae2e7167589b632565c478f993b48f7 # v1.3.0
        with:
          prefix: "@mondoohq"
          token: ${{ secrets.NPM_TOKEN }}
          description: >
            AI agent skill security scanner. Detects locally installed
            agent skills, computes SHA-256 checksums, and queries the
            Mondoo AI Agent Security database for known threats.
          keywords: ai-security,agent-skills,skillcheck,mondoo,cli,devsecops,prompt-injection,supply-chain
          files: README.md,LICENSE
